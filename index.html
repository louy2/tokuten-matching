<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tokuten Matching</title>
  </head>
  <body>
    <div id="root">
      <!-- Fallback shown until React mounts (or if JS fails to load) -->
      <div id="loading-fallback" style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;color:#6b7280">
        <div style="text-align:center">
          <div style="width:24px;height:24px;border:2px solid #d1d5db;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
          <p style="margin-top:12px;font-size:14px">Loading…</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If the module script fails to load, show a helpful message after 10s
      setTimeout(function() {
        var fb = document.getElementById('loading-fallback');
        if (fb) {
          fb.innerHTML = '<div style="text-align:center;max-width:400px;padding:2rem">'
            + '<h2 style="font-size:18px;font-weight:bold;color:#111827;margin-bottom:8px">Page failed to load</h2>'
            + '<p style="font-size:14px;color:#6b7280;margin-bottom:16px">The application could not start. This may be caused by a network issue or browser privacy settings.</p>'
            + '<button onclick="location.reload()" style="padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Reload</button>'
            + '</div>';
        }
      }, 10000);
    </script>
  </body>
</html>
